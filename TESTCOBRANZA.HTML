// LÓGICA DE LA APLICACIÓN
// ============================================================
const puestoSelect = document.getElementById('puestoSelect');
const testContainer = document.getElementById('testContainer');
const gradeBtn = document.getElementById('gradeBtn');
const clearBtn = document.getElementById('clearBtn');
const resetBtn = document.getElementById('resetBtn');
const actionsArea = document.getElementById('actionsArea');
const scoreDisplay = document.getElementById('scoreDisplay');

let currentPuestoIndex = 0;
let graded = false;

// Llenar selector
function populateSelect() {
    testData.forEach((item, idx) => {
        const opt = document.createElement('option');
        opt.value = idx;
        opt.textContent = item.puesto;
        puestoSelect.appendChild(opt);
    });
    puestoSelect.selectedIndex = 0;
    currentPuestoIndex = 0;
}

// Renderizar preguntas para el puesto seleccionado
function renderTest(puestoIdx) {
    const data = testData[puestoIdx];
    if (!data) {
        testContainer.innerHTML = '<div class="no-questions">No se encontraron preguntas para este puesto.</div>';
        actionsArea.style.display = 'none';
        return;
    }
    graded = false;
    let html = `<div class="test-info">
        <span>📌 ${data.puesto}</span>
        <span>📝 ${data.preguntas.length} preguntas</span>
    </div>`;
    data.preguntas.forEach((q, idx) => {
        const qNum = idx + 1;
        html += `<div class="question-card" id="qcard-${idx}">
            <div class="q-header">
                <span class="q-number">${qNum}</span>
                <span class="q-text">${q.pregunta}</span>
            </div>
            <div class="options" id="options-${idx}">`;
        q.opciones.forEach((opt, optIdx) => {
            const letter = String.fromCharCode(65 + optIdx); // A, B, C, D
            html += `<div class="option" id="opt-${idx}-${optIdx}">
                <input type="radio" name="q${idx}" value="${optIdx}" id="q${idx}-${optIdx}">
                <label for="q${idx}-${optIdx}"><strong>${letter}.</strong> ${opt}</label>
            </div>`;
        });
        html += `</div>
            <div class="feedback" id="fb-${idx}"></div>
        </div>`;
    });
    testContainer.innerHTML = html;
    actionsArea.style.display = 'flex';
    scoreDisplay.textContent = '0/10';

    // Resetear estado de calificación
    document.querySelectorAll('.feedback').forEach(f => f.classList.remove('show'));
    document.querySelectorAll('.option').forEach(o => {
        o.classList.remove('correct', 'incorrect', 'disabled');
    });
}

// Obtener respuestas seleccionadas
function getSelectedAnswers() {
    const data = testData[currentPuestoIndex];
    if (!data) return [];
    const answers = [];
    data.preguntas.forEach((_, idx) => {
        const radios = document.querySelectorAll(`input[name="q${idx}"]`);
        let selected = null;
        radios.forEach(r => { if (r.checked) selected = parseInt(r.value); });
        answers.push(selected);
    });
    return answers;
}

// Calificar test
function gradeTest() {
    if (graded) return;
    const data = testData[currentPuestoIndex];
    if (!data) return;
    const answers = getSelectedAnswers();
    let correctCount = 0;
    data.preguntas.forEach((q, idx) => {
        const selected = answers[idx];
        const isCorrect = (selected === q.correcta);
        if (isCorrect) correctCount++;
        // Mostrar feedback
        const fb = document.getElementById(`fb-${idx}`);
        fb.classList.add('show');
        if (selected === null) {
            fb.innerHTML = '❌ No respondida.';
            fb.style.borderLeftColor = '#d65a5a';
        } else if (isCorrect) {
            fb.innerHTML = '✅ Correcto.';
            fb.style.borderLeftColor = '#2c9e6b';
        } else {
            fb.innerHTML = `❌ Incorrecto. La respuesta correcta era <strong>${String.fromCharCode(65 + q.correcta)}</strong>.`;
            fb.style.borderLeftColor = '#d65a5a';
        }
        // Marcar opciones
        const optDivs = document.querySelectorAll(`#options-${idx} .option`);
        optDivs.forEach((div, optIdx) => {
            div.classList.add('disabled');
            if (optIdx === q.correcta) {
                div.classList.add('correct');
            } else if (optIdx === selected && selected !== null && selected !== q.correcta) {
                div.classList.add('incorrect');
            }
        });
    });
    scoreDisplay.textContent = `${correctCount}/${data.preguntas.length}`;
    graded = true;
}

// Limpiar respuestas (sin calificar)
function clearAnswers() {
    if (graded) {
        // Si ya calificado, volver a renderizar para limpiar todo
        renderTest(currentPuestoIndex);
        return;
    }
    // Si no calificado, solo desmarcar radios y ocultar feedbacks
    document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
    document.querySelectorAll('.feedback').forEach(f => f.classList.remove('show'));
    scoreDisplay.textContent = '0/10';
}

// Reiniciar completamente (vuelve al primer puesto)
function resetAll() {
    puestoSelect.selectedIndex = 0;
    currentPuestoIndex = 0;
    renderTest(0);
}

// Event listeners
puestoSelect.addEventListener('change', (e) => {
    currentPuestoIndex = parseInt(e.target.value);
    renderTest(currentPuestoIndex);
});

gradeBtn.addEventListener('click', gradeTest);
clearBtn.addEventListener('click', clearAnswers);
resetBtn.addEventListener('click', resetAll);

// Inicializar
populateSelect();
renderTest(0);
</script>
